version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neotunes-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: neotunes
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - neotunes-net

  redis:
    image: redis:7-alpine
    container_name: neotunes-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - neotunes-net

volumes:
  pgdata:
  redisdata:

networks:
  neotunes-net:
    driver: bridge
