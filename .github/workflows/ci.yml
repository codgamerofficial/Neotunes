name: NeoTunes CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    name: NeoTunes Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Lint
        run: npm run lint

      - name: Run Vitest Unit Tests
        run: npx vitest run

      - name: Run Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:password123@localhost:5432/neotunes?schema=public"
          UPSTASH_REDIS_REST_URL: "https://mock-redis.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "mock-token"
          SUPABASE_URL: "https://mock-supabase.supabase.co"
          SUPABASE_ANON_KEY: "mock-key"
          SUPABASE_SERVICE_ROLE_KEY: "mock-key"
          YOUTUBE_API_KEY: "mock-key"
          SPOTIFY_CLIENT_ID: "mock-id"
          SPOTIFY_CLIENT_SECRET: "mock-secret"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          NEXT_PUBLIC_SUPABASE_URL: "https://mock-supabase.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"

